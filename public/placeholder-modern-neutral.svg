<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Placeholder de perfil neutral">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9d9df" />
      <stop offset="100%" stop-color="#b8bcc7" />
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-opacity="0.25" />
    </filter>
    <clipPath id="round">
      <rect x="16" y="16" width="480" height="480" rx="120" ry="120"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="120" ry="120" fill="url(#bg)" filter="url(#softShadow)"/>
  
  <!-- Diagonal sheen -->
  <path d="M0,130 L512,-10 L512,70 L0,210 Z" fill="#ffffff" opacity="0.12" />
  
  <!-- Person silhouette -->
  <g transform="translate(0,8)">
    <!-- Head -->
    <circle cx="256" cy="190" r="78" fill="#ffffff" opacity="0.95"/>
    <!-- Shoulders/torso -->
    <path d="M128 380
             C128 312, 192 276, 256 276
             C320 276, 384 312, 384 380
             L384 416
             Q384 448, 352 448
             L160 448
             Q128 448, 128 416 Z" fill="#ffffff" opacity="0.95"/>
    <!-- Outline to improve contrast -->
    <circle cx="256" cy="190" r="82" fill="none" stroke="#101216" stroke-width="6" opacity="0.35"/>
    <path d="M122 380
             C122 304, 192 270, 256 270
             C320 270, 390 304, 390 380" fill="none" stroke="#101216" stroke-width="6" opacity="0.35"/>
  </g>

  <!-- Bottom label pill (optional, subtle) -->
  <g opacity="0.85">
    <rect x="140" y="420" width="232" height="44" rx="22" fill="#101216" />
    <text x="256" y="449" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif"
          font-size="20" text-anchor="middle" font-weight="600" fill="#ffffff">SEM FOTO</text>
  </g>

  <!-- Border for high-contrast mode -->
  <rect x="16" y="16" width="480" height="480" rx="120" ry="120" fill="none" stroke="#000000" stroke-width="0" opacity="0"/>
</svg>
